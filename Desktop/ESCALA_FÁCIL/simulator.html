<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ESCALA_FÁCIL | Assaí Digital</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0A1128;
            --assai-blue: #1E3A8A;
            --assai-orange: #E8592A;
            --bg-body: #111;
            --bg-chat: #F3F4F6;
            --text-main: #1C1E21;
            --bubble-bot: #E5E7EB;
            --bubble-user: #2563eb;
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .app-wrapper {
            width: 100%;
            height: 100vh;
            background: white;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        @media (min-width: 600px) {
            .app-wrapper {
                max-width: 400px;
                height: 90vh;
                border-radius: 40px;
                overflow: hidden;
                box-shadow: 0 20px 50px rgba(0,0,0,0.5);
                border: 8px solid #333;
            }
        }

        /* HEADER PANEL */
        .header-panel {
            background-color: var(--bg-dark);
            padding: 40px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            position: relative;
        }

        .big-mascot {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 25px;
            background: radial-gradient(circle, rgba(232,89,42,0.3) 0%, transparent 70%);
        }

        .brand-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 25px;
        }

        .brand-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            background: white;
            border-radius: 8px;
            padding: 2px;
            object-fit: contain;
        }

        .brand-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-info h1 {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .role-badge {
            background-color: var(--assai-blue);
            color: #DBEAFE;
            font-size: 0.65rem;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .btn-alterar {
            background: transparent;
            border: none;
            color: #9CA3AF;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            text-align: right;
            cursor: pointer;
            line-height: 1.3;
        }

        .slogan {
            font-size: 0.8rem;
            color: #D1D5DB;
            text-align: center;
            font-style: italic;
            padding: 0 10px;
        }

        /* CHAT CONTAINER */
        #chat {
            flex: 1;
            background-color: var(--bg-chat);
            padding: 20px 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }

        .msg {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
            animation: slideIn 0.3s ease-out;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.bot {
            align-self: flex-start;
            background: var(--bubble-bot);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
        }

        .msg.user {
            align-self: flex-end;
            background: var(--bubble-user);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .msg strong { font-weight: 800; }

        /* INPUT AREA */
        .input-dock {
            background: var(--bg-chat);
            padding: 10px 15px 20px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            position: relative;
        }

        .input-wrapper {
            flex: 1;
            background: white;
            border-radius: 25px;
            padding: 0 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            min-height: 50px;
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            font-size: 0.95rem;
            outline: none;
            color: var(--text-main);
        }
        
        input::placeholder {
            color: #9CA3AF;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: absolute;
            right: 15px;
            bottom: 20px;
        }

        .btn-fab {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--assai-blue);
            display: flex;
            justify-content: center;
            align-items: center;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(30, 58, 138, 0.3);
            transition: 0.2s;
        }

        .btn-fab:hover { transform: scale(1.05); }

        .btn-fab svg {
            width: 22px;
            height: 22px;
            fill: white;
        }
        
        .btn-send svg {
            transform: translateX(2px);
        }

    </style>
</head>
<body>

    <div class="app-wrapper">
        
        <div class="header-panel">
            <img src="/assets/mascot.png" alt="Mascot" class="big-mascot">
            
            <div class="brand-row">
                <div class="brand-left">
                    <img src="/assets/mascot.png" alt="Icon" class="brand-icon">
                    <div class="brand-info">
                        <h1>ESCALA_FÁCIL</h1>
                        <span class="role-badge" id="roleBadge">COLABORADOR</span>
                    </div>
                </div>
                <button class="btn-alterar" onclick="toggleRole()">
                    ALTERAR<br>PERFIL
                </button>
            </div>
            
            <div class="slogan">
                "Organizando sua escala, para que você faça toda a diferença!"
            </div>
        </div>

        <div id="chat">
            <!-- As mensagens aparecerão aqui -->
        </div>

        <div class="input-dock">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Digite uma mensagem..." onkeypress="if(event.key==='Enter') sendMessage()">
            </div>
            
            <div class="action-buttons">
                <button class="btn-fab btn-refresh" onclick="reiniciar()">
                    <!-- Refresh Icon -->
                    <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                </button>
                <button class="btn-fab btn-send" onclick="sendMessage()">
                    <!-- Send Icon (Paper plane) -->
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentNumber = "+55117101309"; // Mapeado para o perfil de Claudemir
        const WEBHOOK_URL = "/webhook";

        function reiniciar() {
            document.getElementById('chat').innerHTML = '';
            addMessage("bot", "Olá! Eu sou o ESCALA_FÁCIL 🤖\nBem-vindo ao simulador oficial.\n\nPor favor, informe sua matrícula para continuar.");
        }

        window.onload = reiniciar;

        function addMessage(type, text) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            
            // Markdown bold parser
            let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            div.innerHTML = formattedText.replace(/\n/g, '<br>');
            
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if(!text) return;

            addMessage("user", text);
            input.value = "";

            if (text.toUpperCase() === 'REINICIAR') {
                reiniciar();
                return;
            }

            const formData = new URLSearchParams();
            formData.append('From', 'whatsapp:' + currentNumber);
            formData.append('Body', text);

            try {
                // Indicador de digitação
                const typingDiv = document.createElement('div');
                typingDiv.className = 'msg bot typing';
                typingDiv.innerText = 'Digitando...';
                typingDiv.id = 'typing-indicator';
                document.getElementById('chat').appendChild(typingDiv);
                document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;

                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                });

                document.getElementById('typing-indicator').remove();

                if (!response.ok) throw new Error('Falha no servidor');

                const twiml = await response.text();
                const botResponse = extractBody(twiml);
                addMessage("bot", botResponse);
            } catch (e) {
                console.error(e);
                const typing = document.getElementById('typing-indicator');
                if (typing) typing.remove();
                addMessage("bot", "❌ Erro de conexão com o servidor ESCALA_FÁCIL.");
            }
        }

        function extractBody(twiml) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(twiml, "text/xml");
            const node = xmlDoc.getElementsByTagName("Message")[0];
            return node ? node.textContent : "Erro ao processar resposta do bot.";
        }

        function toggleRole() {
            currentNumber = currentNumber === "+55117101309" ? "+5511101010" : "+55117101309";
            const label = currentNumber === "+5511101010" ? "GESTOR" : "COLABORADOR";
            document.getElementById('roleBadge').innerText = label;
            reiniciar();
            
            if (label === "GESTOR") {
                // Se o usuário trocou para Gestor, simulamos o acesso com a matricula de Ederson
                setTimeout(() => {
                    const simulateGestorInput = document.getElementById('userInput');
                    simulateGestorInput.value = "MENU";
                    sendMessage();
                }, 500);
            }
        }
    </script>
</body>
</html>
