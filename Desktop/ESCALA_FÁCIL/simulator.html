<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESCALA_FÁCIL - Brutalist Hub</title>
    <meta name="description" content="Gestão Radical de Escalas - Assaí.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF4D00; /* Signal Orange */
            --bg: #000000;
            --surface: #111111;
            --text: #FFFFFF;
            --text-dim: #888888;
            --accent: #FFFFFF;
            --error: #FF0000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* Background Typography */
        .bg-text {
            position: absolute;
            font-family: 'Outfit', sans-serif;
            font-size: 25vw;
            line-height: 0.8;
            color: rgba(255, 77, 0, 0.03);
            pointer-events: none;
            z-index: 0;
            white-space: nowrap;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-5deg);
            font-weight: 900;
        }

        /* Side Info (Asymmetric 10%) */
        .side-info {
            width: 15vw;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-right: 1px solid #222;
            z-index: 10;
        }

        .side-info h1 {
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--primary);
        }

        .side-info .status-box {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid #333;
            padding: 10px;
        }

        /* Main Stage */
        .stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 5;
        }

        /* The Phone (Brutalist Container) */
        .phone-mock {
            width: 380px;
            height: 80vh;
            background: var(--surface);
            border: 2px solid var(--accent);
            display: flex;
            flex-direction: column;
            position: relative;
            animation: stageIn 0.8s cubic-bezier(0.2, 1, 0.2, 1);
        }

        @keyframes stageIn {
            from { opacity: 0; transform: translateY(40px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Header */
        .header {
            padding: 30px;
            background: var(--primary);
            color: black;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .header h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            line-height: 1;
        }

        .header .status {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .header .status::before {
            content: '';
            width: 6px;
            height: 6px;
            background: black;
            display: block;
        }

        /* Chat */
        .chat-flow {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scrollbar-width: none;
        }

        .chat-flow::-webkit-scrollbar { display: none; }

        .msg {
            max-width: 90%;
            padding: 15px;
            font-size: 13px;
            line-height: 1.6;
            animation: msgIn 0.4s ease-out both;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .msg.bot {
            background: #222;
            color: #ddd;
            align-self: flex-start;
            border-left: 3px solid var(--primary);
        }

        .msg.user {
            background: var(--text);
            color: black;
            align-self: flex-end;
            font-weight: 700;
            border-right: 3px solid var(--primary);
            animation: msgUserIn 0.4s ease-out both;
        }

        @keyframes msgUserIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Input Zone */
        .input-zone {
            padding: 20px;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: transparent;
            border: 1px solid #444;
            padding: 15px;
            color: white;
            font-size: 12px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--primary); }

        button {
            background: var(--primary);
            border: none;
            padding: 0 25px;
            font-weight: 900;
            font-size: 10px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { background: white; color: black; }

        /* Actions Bar */
        .actions-bar {
            position: absolute;
            top: 30px;
            right: -60px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            border: 2px solid var(--accent);
            background: var(--bg);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
        }

        .action-btn:hover { background: var(--primary); color: black; }

        @media (max-width: 900px) {
            .side-info { display: none; }
            .bg-text { font-size: 40vw; }
            .phone-mock { width: 100vw; height: 100vh; border: none; }
            .actions-bar { right: 20px; top: 120px; }
        }

        /* Markdown elements */
        strong { color: var(--primary); }
        em { color: var(--text-dim); }
    </style>
</head>
<body>

    <div class="bg-text">ESCALA</div>

    <div class="side-info">
        <div>
            <h1>ESCALA_FÁCIL</h1>
            <p style="font-size: 9px; margin-top: 10px; color: var(--text-dim)">PRECISÃO BRUTALISTA NA SUA PALMA.</p>
        </div>
        
        <div class="status-box">
            <p style="color: var(--primary)">SESSION: <span id="sess-stat">ACTIVE</span></p>
            <p id="curr-phone" style="margin-top: 5px;">+5511000000000</p>
        </div>
    </div>

    <div class="stage">
        <h1 style="display: none;">ESCALA_FÁCIL - Brutalist Interface</h1>
        
        <div class="phone-mock">
            <div class="header">
                <h2>ESCALA_FÁCIL</h2>
                <div class="status">Bot System Operational</div>
                <div id="perfil-tag" style="background: black; color: white; display: inline-block; padding: 2px 6px; font-size: 8px; font-weight: 900; letter-spacing: 1px;">IDENTIFICANDO...</div>
            </div>

            <div class="chat-flow" id="chat">
                <div class="msg bot">Bem-vindo ao <strong>ESCALA_FÁCIL</strong>.<br>Para autenticar seu acesso, informe sua <strong>MATRÍCULA</strong>.</div>
            </div>

            <div class="actions-bar">
                <div class="action-btn" onclick="toggleRole()" title="Switch Role">🔄</div>
                <div class="action-btn" onclick="sendCmd('MENU')" title="Open Menu">📜</div>
                <div class="action-btn" onclick="sendCmd('REINICIAR')" title="Clear Session">⚡</div>
            </div>

            <div class="input-zone">
                <input type="text" id="userInput" placeholder="COMMAND LINE" onkeypress="handleKey(event)">
                <button onclick="sendMessage()">SEND</button>
            </div>
        </div>
    </div>

    <script>
        let currentNumber = "+5511999990001";
        const WEBHOOK_URL = window.location.origin + "/webhook";

        function handleKey(e) { if (e.key === 'Enter') sendMessage(); }

        function sendCmd(cmd) {
            document.getElementById('userInput').value = cmd;
            sendMessage();
        }

        function toggleRole() {
            currentNumber = currentNumber === "+5511999990001" ? "+5511888880000" : "+5511999990001";
            document.getElementById('curr-phone').innerText = currentNumber;
            document.getElementById('chat').innerHTML = ''; // Limpa histórico
            addMessage("bot", "PERFIL TROCADO. HISTÓRICO LIMPO.\nENVIE SUA MATRÍCULA.");
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            addMessage("user", text);
            input.value = '';

            try {
                const formData = new URLSearchParams();
                formData.append('From', 'whatsapp:' + currentNumber);
                formData.append('Body', text);

                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                });

                const twiml = await response.text();
                const botResponse = extractBody(twiml);
                
                // Se o comando foi REINICIAR, limpamos o chat local antes de mostrar a resposta
                if (text.toUpperCase() === 'REINICIAR' || text.toUpperCase() === 'RESTART') {
                    document.getElementById('chat').innerHTML = '';
                    addMessage("bot", "Sessão reiniciada. Histórico limpo.");
                }

                addMessage("bot", botResponse);

                // Auto-detection
                if (botResponse.includes("Gestor")) updateTag("GESTOR");
                else if (botResponse.includes("Colaborador")) updateTag("COLABORADOR");

            } catch (error) {
                addMessage("bot", "SYSTEM ERROR: FAILED TO CONNECT WEBHOOK.");
            }
        }

        function extractBody(twiml) {
            const match = twiml.match(/<Body>(.*?)<\/Body>/s);
            if (match && match[1]) {
                let text = match[1]
                    .replace(/&quot;/g, '"')
                    .replace(/&apos;/g, "'")
                    .replace(/&gt;/g, ">")
                    .replace(/&lt;/g, "<")
                    .replace(/&amp;/g, "&");
                
                text = text.replace(/\*(.*?)\*/g, '<strong>$1</strong>');
                text = text.replace(/_(.*?)_/g, '<em>$1</em>');
                return text;
            }
            return "NULL RESPONSE.";
        }

        function addMessage(type, text) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = text;
            chat.appendChild(div);
            chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
        }

        function updateTag(role) {
            const tag = document.getElementById('perfil-tag');
            tag.innerText = role;
            tag.style.background = role === "GESTOR" ? "white" : "black";
            tag.style.color = role === "GESTOR" ? "black" : "white";
        }
    </script>
</body>
</html>
